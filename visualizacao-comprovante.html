
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualização do Comprovante - Conecta Eventos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body { background-color: #f8fafc; color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; }
    
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 0 4%; height: 80px; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .logo-container { display: flex; align-items: center; gap: 12px; }
    .logo-img { width: 35px; height: 35px; object-fit: contain; }
    .logo-brand { font-size: 1.35rem; font-weight: 700; color: #1e1b4b; display: flex; gap: 6px; } 
    .logo-brand span { color: #6366f1; font-size: 0.8rem; font-weight: 500;margin-top: 10px; }
    
    .search-wrapper { position: relative; width: 300px; }
    .search-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 10px 10px 35px; }
    .nav-menu { display: flex; gap: 20px; font-size: 0.9rem; font-weight: 500; }
    
    .user-profile-wrapper { position: relative; display: flex; align-items: center; gap: 20px; }
    .user-info-box { cursor: pointer; display: flex; align-items: center; gap: 10px; }
    
    .profile-dropdown { position: absolute; top: 120%; right: 0; width: 220px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: none; padding: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 999; }
    .profile-dropdown.show { display: block; }
    .dropdown-item { display: flex; align-items: center; gap: 12px; padding: 10px; color: #64748b; font-size: 0.9rem; border-radius: 8px; text-decoration: none; }
    .dropdown-item:hover { background: #f8fafc; }

    .main-wrapper { padding: 40px 8%; flex: 1; display: flex; flex-direction: column; }
    .content-area { flex: 1; }
    
    .breadcrumb { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }
    .btn-back { color: #4f46e5; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .btn-action { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; font-weight: 600; color: #334155; display: flex; align-items: center; gap: 8px; }
    
    .cert-preview-container { text-align: center; }
    .cert-img { max-width: 50%; height: auto; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

    .official-note { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-top: 60px; color: #475569; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-container">
      <img src="logo.png" alt="Logo" class="logo-img">
      <div class="logo-brand">Conecta <span>Eventos</span></div>
    </div>
    
    <div class="search-wrapper">
      <i class="fas fa-search" style="position: absolute; left: 10px; top: 12px; color: #94a3b8;"></i>
      <input type="text" class="search-input" placeholder="Buscar...">
    </div>
    
    <nav class="nav-menu">
      <a href="#" style="color:#0f172a; text-decoration:none;">Início</a>
      <a href="#" style="color:#6366f1; text-decoration:none;">Eventos</a>
      <a href="#" style="color:#0f172a; text-decoration:none;">Categorias</a>
      <a href="#" style="color:#0f172a; text-decoration:none;">Sobre</a>
      <a href="#" style="color:#0f172a; text-decoration:none;">Contato</a>
    </nav>
    
    <div class="user-profile-wrapper">
      <i class="far fa-bell" style="cursor:pointer;"></i>
      <div class="user-info-box" id="profileDropdownBtn">
        <img src="foto-amanda.jpeg" style="width: 36px; height: 36px; border-radius: 50%;"> 
        <span>Olá, Maria</span>
        <i class="fas fa-chevron-down" style="font-size: 0.75rem;"></i>
      </div>
      
      <div class="profile-dropdown" id="profileDropdownMenu">
        <a href="#" class="dropdown-item"><i class="far fa-user"></i> Meus dados</a>
        <a href="#" class="dropdown-item"><i class="far fa-calendar-alt"></i> Minhas inscrições</a>
        <a href="#" class="dropdown-item"><i class="fas fa-shield-alt"></i> Comprovantes</a>
        <a href="#" class="dropdown-item"><i class="fas fa-certificate"></i> Certificados</a>
        <a href="#" class="dropdown-item"><i class="fas fa-cog"></i> Configurações</a>
        <a href="#" class="dropdown-item" style="color: red;"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </div>
    </div>
  </header>

  <main class="main-wrapper">
    <div class="content-area">
        <div class="breadcrumb">Comprovantes > Visualizar comprovante</div>

        <div class="action-bar">
          <div class="btn-back"><i class="fas fa-arrow-left"></i> Voltar para meus comprovantes</div>
          <div style="display: flex; gap: 10px;">
            <button class="btn-action"><i class="fas fa-download"></i> Baixar (PDF)</button>
            <button class="btn-action"><i class="fas fa-print"></i> Imprimir</button>
          </div>
        </div>

        <div class="cert-preview-container">
          <img src="certificado.jpeg" alt="Comprovante de Participação" class="cert-img">
        </div>
    </div>

    <div class="official-note">
      <i class="fas fa-info-circle"></i> 
      Este é um documento oficial emitido pela plataforma Conecta Eventos.
    </div>
  </main>

  <script>
    document.getElementById('profileDropdownBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('profileDropdownMenu').classList.toggle('show'); };
    document.onclick = () => document.getElementById('profileDropdownMenu').classList.remove('show');
  </script>
</body>
</html>
